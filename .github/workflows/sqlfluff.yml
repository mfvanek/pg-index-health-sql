name: Lint SQL with SQLFluff
permissions:
  contents: read
on:
  push:
    branches: [master]
    paths:
      - "sql/**/*.sql"
      - ".sqlfluff"
  pull_request:
    paths:
      - "sql/**/*.sql"
      - ".sqlfluff"
jobs:
  lint-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SQLFluff
        run: pip install sqlfluff==0.3.6

      - name: Run SQLFluff
        run: sqlfluff lint sql --config .github/linters/.sqlfluff
