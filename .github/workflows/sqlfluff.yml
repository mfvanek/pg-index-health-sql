name: Lint SQL with SQLFluff

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SQLFluff
        run: pip install sqlfluff==4.0.4
      - name: Run SQLFluff
        run: sqlfluff lint sql --config .github/linters/.sqlfluff